name: iosApp
options:
  bundleIdPrefix: io.krypton
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: io.krypton.sample
    SWIFT_VERSION: "5.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
    settings:
      base:
        FRAMEWORK_SEARCH_PATHS: $(SRCROOT)/../build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)
        OTHER_LDFLAGS: $(inherited) -framework ComposeApp
        INFOPLIST_FILE: iosApp/Info.plist
    preBuildScripts:
      - name: Compile Kotlin Framework
        basedOnDependencyAnalysis: false
        script: |
          cd "$SRCROOT/../../.."
          ./gradlew :samples:composeApp:embedAndSignAppleFrameworkForXcode
